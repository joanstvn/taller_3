<!-- FORMULARIOS -->
<!-- FIX ACCESSIBILITY: tabindex="-1" para skip link + min-height para layout -->
<main id="main" tabindex="-1" class="container py-5" style="min-height: calc(100vh - 130px);">
  <div class="row g-4 align-items-start">

    <!-- REGISTRO -->
    <section class="col-12 col-lg-6" aria-labelledby="titulo-registro">
      <div class="card border rounded-4 shadow-sm p-1">
        <div class="card-body">
          <h2 id="titulo-registro" class="h5 fw-bold mb-4">Crear cuenta</h2>
          <form novalidate>
            <div class="mb-3">
              <label for="registroNombre" class="form-label text-uppercase text-muted small fw-semibold">Nombre completo</label>
              <input type="text" class="form-control rounded-3 bg-light border" id="registroNombre" name="registroNombre" placeholder="Tu nombre completo" autocomplete="name" required aria-required="true">
            </div>
            <div class="mb-3">
              <label for="registroCorreo" class="form-label text-uppercase text-muted small fw-semibold">Correo electrónico</label>
              <input type="email" class="form-control rounded-3 bg-light border" id="registroCorreo" name="registroCorreo" placeholder="tu@correo.com" autocomplete="email" required aria-required="true">
            </div>
            <div class="mb-3">
              <label for="registroClave" class="form-label text-uppercase text-muted small fw-semibold">Contraseña</label>
              <input type="password" class="form-control rounded-3 bg-light border" id="registroClave" name="registroClave" placeholder="Crea una contraseña segura" autocomplete="new-password" required aria-required="true">
            </div>
            <div class="mb-4">
              <label for="registroConfirmacion" class="form-label text-uppercase text-muted small fw-semibold">Confirmar contraseña</label>
              <input type="password" class="form-control rounded-3 bg-light border" id="registroConfirmacion" name="registroConfirmacion" placeholder="Repite la contraseña" autocomplete="new-password" required aria-required="true">
            </div>
            <div class="form-check mb-4">
              <input class="form-check-input" type="checkbox" id="recordarRegistro" name="recordarRegistro">
              <label class="form-check-label small text-secondary" for="recordarRegistro">Recordar sesión en este dispositivo</label>
            </div>
            <button type="submit" class="btn btn-dark rounded-pill w-100 py-2 fw-semibold">Crear cuenta</button>
            <p class="text-center text-muted small mt-3 mb-0">¿Ya tienes cuenta? <a href="#login" class="text-dark fw-semibold text-decoration-none">Inicia sesión</a></p>
          </form>
        </div>
      </div>
    </section>

    <!-- LOGIN -->
    <section class="col-12 col-lg-6" id="login" aria-labelledby="titulo-login">
      <div class="card border rounded-4 shadow-sm p-1">
        <div class="card-body">
          <h2 id="titulo-login" class="h5 fw-bold mb-4">Iniciar sesión</h2>
          <form novalidate>
            <div class="mb-3">
              <label for="loginCorreo" class="form-label text-uppercase text-muted small fw-semibold">Correo electrónico</label>
              <input type="email" class="form-control rounded-3 bg-light border" id="loginCorreo" name="loginCorreo" placeholder="tu@correo.com" autocomplete="email" required aria-required="true">
            </div>
            <div class="mb-4">
              <div class="d-flex justify-content-between align-items-baseline">
                <label for="loginClave" class="form-label text-uppercase text-muted small fw-semibold mb-0">Contraseña</label>
                <!--
                  FIX ACCESSIBILITY — link "¿Olvidaste tu contraseña?":
                  El texto original es suficientemente descriptivo.
                  Se mantiene pero se asegura que NO esté dentro del <label>
                  (estaba en un div separado, correcto).
                -->
                <a href="#" class="small text-dark text-decoration-none fw-semibold">¿Olvidaste tu contraseña?</a>
              </div>
              <input type="password" class="form-control rounded-3 bg-light border mt-1" id="loginClave" name="loginClave" placeholder="Tu contraseña" autocomplete="current-password" required aria-required="true">
            </div>
            <div class="form-check mb-4">
              <input class="form-check-input" type="checkbox" id="recordarLogin" name="recordarLogin">
              <label class="form-check-label small text-secondary" for="recordarLogin">Recordar sesión en este dispositivo</label>
            </div>
            <button type="submit" class="btn btn-dark rounded-pill w-100 py-2 fw-semibold">Acceder</button>
            <p class="text-center text-muted small mt-3 mb-0">¿No tienes cuenta? <a href="#titulo-registro" class="text-dark fw-semibold text-decoration-none">Regístrate gratis</a></p>
          </form>
        </div>
      </div>
    </section>

  </div>
